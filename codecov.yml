# Codecov configuration. Source of truth for the PR status checks
# `codecov/project` and `codecov/patch`, and the README coverage badge.

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  # Targets are 95%, not 100%: the only uncovered lines are fs-error handlers in
  # app.plugin.js (non-ENOENT read failure, write failure) that can't be
  # exercised without mocking fs, which we've chosen not to do. Real coverage
  # sits ~95.6%, just above the 95% target.
  range: '90...100'
  status:
    project:
      default:
        target: 95%
        threshold: 0.5%
        if_ci_failed: error
    patch:
      default:
        target: 95%
        threshold: 0.5%

# Native code, build output, demo app, and the config plugin are not covered
# by Bun's test runner. Native effects are smoke-verified on device per the
# bootstrap plan; the config plugin is exercised at prebuild time in CI.
ignore:
  - 'dist/**/*'
  - 'plugin/**/*'
  - 'demo/**/*'
  - 'android/**/*'
  - 'ios/**/*'
  - 'scripts/**/*'
  - 'test/**/*'
  - '*.config.*'

comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: false
