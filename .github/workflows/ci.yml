name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for the whole workflow; the `release` job
# overrides with a broader block for semantic-release to push tags.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run lint

      - name: Typecheck (tsgo)
        run: bun run typecheck

      - name: Typecheck tests (tsgo)
        run: bun run typecheck:test

      - name: React Compiler safety (eslint react-compiler rule on library components)
        run: bun run check:react-compiler

      - name: Build (library + config plugin)
        run: bun run build

      - name: Package hygiene (publint)
        run: bun run check:package

      - name: Dead code (knip)
        run: bun run check:knip

      - name: Install shader toolchain
        run: sudo apt-get update && sudo apt-get install -y glslang-tools spirv-tools spirv-cross

      - name: Shader drift (canonical GLSL vs generated/transpiled outputs)
        run: bun run check:shaders

      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage reports to Codecov
        if: >
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5.5.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  release:
    name: Release
    needs: check
    # Opt-in gate: set repo variable RELEASE_ENABLED=true and configure the
    # APP_ID / APP_PRIVATE_KEY secrets before flipping this on. Skipped by
    # default so CI stays green on a pre-publish tree.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # @semantic-release/git makes the `chore(release)` commit; the lefthook
          # pre-commit dev gate must not run in release automation (it assumes a
          # full dev install, e.g. the demo's deps). Disable lefthook for this step.
          LEFTHOOK: '0'
        run: npx semantic-release
