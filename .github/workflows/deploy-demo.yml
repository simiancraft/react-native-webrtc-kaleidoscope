name: Deploy demo (Expo Web) to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild the demo when things that could affect it change.
    paths:
      - 'demo/**'
      - 'src/**'
      - 'plugin/**'
      - 'expo-module.config.json'
      - 'app.plugin.js'
      - 'package.json'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

# Required for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time.
concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install (root; needed to build kaleidoscope dist + config plugin)
        run: bun install --frozen-lockfile

      - name: Build kaleidoscope (demo imports the workspace package)
        run: bun run build

      - name: Install (demo)
        working-directory: ./demo
        run: bun install --no-frozen-lockfile

      - name: Export Expo Web
        working-directory: ./demo
        env:
          GITHUB_PAGES: 'true'
        run: bunx expo export -p web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
