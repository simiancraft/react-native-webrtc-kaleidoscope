name: Deploy demo (Expo Web) to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild the demo when things that could affect it change.
    paths:
      - 'demo/**'
      - 'src/**'
      - 'web-driver/**'
      - 'catalog/**'
      - 'plugin/**'
      - 'expo-module.config.json'
      - 'app.plugin.js'
      - 'package.json'
      - '.github/workflows/deploy-demo.yml'
  # Gate every PR on a clean demo Metro bundle; deploy still only runs on
  # push to main so PRs do not publish to GitHub Pages.
  pull_request:
  workflow_dispatch:

# Required for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize per ref: main keeps one Pages deploy at a time, while PR runs
# get their own group so concurrent PRs do not cancel each other's build
# check (a fixed group string let any PR run cancel any other).
concurrency:
  group: deploy-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build demo bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install (root; needed to build kaleidoscope dist + config plugin)
        run: bun install --frozen-lockfile

      - name: Build kaleidoscope (demo imports the workspace package)
        run: bun run build

      - name: Install (demo)
        working-directory: ./demo
        run: bun install --no-frozen-lockfile

      - name: Export Expo Web
        working-directory: ./demo
        env:
          GITHUB_PAGES: 'true'
        run: bunx expo export -p web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./demo/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Pages deploy is push-to-main only; PR runs stop after build.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
